name: Autobot

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  autobot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run autobot script
        run: bash scripts/autobot.sh

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "${{ env.COMMIT_MESSAGE }}"
          file_pattern: logs/daily.md
          # commit_author is what lands in --author, and it defaults to
          # github.actor -- which is github-actions[bot] here, since Autorun
          # dispatches this workflow with GITHUB_TOKEN. Pin it explicitly.
          commit_author: LuminousVar <116353512+LuminousVar@users.noreply.github.com>
          commit_user_name: LuminousVar
          commit_user_email: 116353512+LuminousVar@users.noreply.github.com
